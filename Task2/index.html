<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow">CodeSoft Task 2</p>
      <h1>Tic-Tac-Toe AI</h1>
      <p class="intro">
        Play against an unbeatable AI powered by the Minimax algorithm. Pick a side,
        make your move, and try to force a draw.
      </p>
      <div class="controls">
        <div class="choice-group" role="group" aria-label="Choose your symbol">
          <button class="choice-btn active" data-symbol="X">Play as X</button>
          <button class="choice-btn" data-symbol="O">Play as O</button>
        </div>
        <button class="sound-btn" id="sound-btn" aria-pressed="true">Sound: On</button>
        <button class="reset-btn" id="reset-btn">New Game</button>
      </div>
    </section>

    <section class="game-panel">
      <div class="status-card">
        <p class="status-label">Match Status</p>
        <p class="status-text" id="status-text">Your turn. Place X to begin.</p>
      </div>

      <div class="board" id="board" aria-label="Tic-Tac-Toe board">
        <button class="cell" data-index="0" aria-label="Cell 1"></button>
        <button class="cell" data-index="1" aria-label="Cell 2"></button>
        <button class="cell" data-index="2" aria-label="Cell 3"></button>
        <button class="cell" data-index="3" aria-label="Cell 4"></button>
        <button class="cell" data-index="4" aria-label="Cell 5"></button>
        <button class="cell" data-index="5" aria-label="Cell 6"></button>
        <button class="cell" data-index="6" aria-label="Cell 7"></button>
        <button class="cell" data-index="7" aria-label="Cell 8"></button>
        <button class="cell" data-index="8" aria-label="Cell 9"></button>
      </div>

      <div class="scoreboard" aria-label="Scoreboard">
        <div class="score-card">
          <span class="score-title">You</span>
          <strong class="score-value" id="player-score">0</strong>
        </div>
        <div class="score-card">
          <span class="score-title">Draws</span>
          <strong class="score-value" id="draw-score">0</strong>
        </div>
        <div class="score-card">
          <span class="score-title">AI</span>
          <strong class="score-value" id="ai-score">0</strong>
        </div>
      </div>

      <div class="legend">
        <div class="legend-item">
          <span class="legend-chip player"></span>
          <span id="player-label">You: X</span>
        </div>
        <div class="legend-item">
          <span class="legend-chip ai"></span>
          <span id="ai-label">AI: O</span>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
